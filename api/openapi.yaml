openapi: 3.0.3
info:
  title: Hydra API
  version: 1.0.0

paths:
  /health:
    get:
      summary: Health check
      operationId: checkHealth
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: "OK"

  /api/status:
    get:
      summary: Get system status
      operationId: getStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agents:
    get:
      summary: List all Hydra agents (heads)
      operationId: listAgents
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error: { type: string }
        code: { type: integer }
        details: { type: string }

    StatusResponse:
      type: object
      properties:
        status:
          type: string
          example: "OK"
        version:
          type: string
          example: "1.0.0"

    AgentResponse:
      type: object
      required: [id, branch_name, has_branch, worktree_path, has_worktree, project_path, container_id, container_status, agent_type, prompt, base_branch]
      properties:
        id:
          type: string
        branch_name:
          type: string
        has_branch:
          type: boolean
        worktree_path:
          type: string
        has_worktree:
          type: boolean
        project_path:
          type: string
        container_id:
          type: string
        container_status:
          type: string
        agent_type:
          type: string
        prompt:
          type: string
        base_branch:
          type: string

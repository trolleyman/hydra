openapi: 3.0.3
info:
  title: Hydra API
  version: 1.0.0

paths:
  /.well-known/appspecific/com.chrome.devtools.json:
    get:
      summary: Chrome DevTools workspace configuration
      operationId: getDevToolsConfig
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    type: object
                    properties:
                      root:
                        type: string
                      uuid:
                        type: string
        '403':
          description: Not running in dev mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health:
    get:
      summary: Health check
      operationId: checkHealth
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: "OK"

  /api/status:
    get:
      summary: Get system status
      operationId: getStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/dev/restart:
    post:
      summary: Trigger a server rebuild and restart (dev mode only)
      operationId: devRestart
      responses:
        '200':
          description: Restart initiated
        '403':
          description: Not running in dev mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/projects:
    get:
      summary: List all known projects
      operationId: listProjects
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectInfo'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Add a new project by folder path
      operationId: addProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProjectRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectInfo'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agents:
    get:
      summary: List all Hydra agents (heads)
      operationId: listAgents
      parameters:
        - in: query
          name: project_id
          required: false
          schema:
            type: string
          description: Project ID to scope the agent list (defaults to server CWD project)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Spawn a new Hydra agent
      operationId: spawnAgent
      parameters:
        - in: query
          name: project_id
          required: false
          schema:
            type: string
          description: Project ID to spawn the agent in (defaults to server CWD project)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpawnAgentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agent/{id}/restart:
    post:
      summary: Restart a Hydra agent (kill and respawn with the same prompt)
      operationId: restartAgent
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: project_id
          required: false
          schema:
            type: string
          description: Project ID to scope the lookup (defaults to server CWD project)
      responses:
        '200':
          description: OK (Agent restarted, new agent returned)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (operation already in progress)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agent/{id}/merge:
    post:
      summary: Merge a Hydra agent's branch into its base branch and kill it
      operationId: mergeAgent
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: project_id
          required: false
          schema:
            type: string
          description: Project ID to scope the lookup (defaults to server CWD project)
      responses:
        '204':
          description: No Content (Agent merged and killed)
        '400':
          description: Bad Request (e.g. no branch to merge)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (operation already in progress or merge conflicts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MergeConflictError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agent/{id}/update-from-base:
    post:
      summary: Update a Hydra agent's branch from its base branch (merge base into head)
      operationId: updateAgentFromBase
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: project_id
          required: false
          schema:
            type: string
          description: Project ID to scope the lookup (defaults to server CWD project)
      responses:
        '204':
          description: No Content (Updated from base)
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (merge conflicts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MergeConflictError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agent/{id}/commits:
    get:
      summary: List commits on an agent's branch (between base branch and agent branch)
      operationId: getAgentCommits
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: project_id
          required: false
          schema:
            type: string
          description: Project ID to scope the lookup (defaults to server CWD project)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommitInfo'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agent/{id}/diff:
    get:
      summary: Get the diff for an agent's branch
      operationId: getAgentDiff
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: project_id
          required: false
          schema:
            type: string
          description: Project ID to scope the lookup (defaults to server CWD project)
        - in: query
          name: base_ref
          required: false
          schema:
            type: string
          description: Base commit SHA or ref. Defaults to the agent's base branch.
        - in: query
          name: head_ref
          required: false
          schema:
            type: string
          description: Head commit SHA or ref. Defaults to the agent's branch.
        - in: query
          name: ignore_whitespace
          required: false
          schema:
            type: boolean
          description: Ignore whitespace changes in the diff
        - in: query
          name: include_uncommitted
          required: false
          schema:
            type: boolean
          description: Include uncommitted changes in the worktree in the diff
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiffResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/config:
    get:
      summary: Get the merged configuration
      operationId: getConfig
      parameters:
        - in: query
          name: project_id
          required: false
          schema:
            type: string
          description: Project ID to scope the config (defaults to server CWD project)
        - in: query
          name: scope
          required: false
          schema:
            type: string
            enum: [project, user]
          description: Load only a specific scope's raw config instead of the merged config
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Save configuration changes
      operationId: saveConfig
      parameters:
        - in: query
          name: project_id
          required: false
          schema:
            type: string
          description: Project ID to save the config to (defaults to server CWD project)
        - in: query
          name: scope
          required: false
          schema:
            type: string
            enum: [project, user]
          description: Whether to save to the project or user config file (defaults to project)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigResponse'
      responses:
        '200':
          description: OK
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agent/{id}:
    get:
      summary: Get a specific Hydra agent by ID
      operationId: getAgent
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: project_id
          required: false
          schema:
            type: string
          description: Project ID to scope the lookup (defaults to server CWD project)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Kill a Hydra agent by ID
      operationId: killAgent
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: project_id
          required: false
          schema:
            type: string
          description: Project ID to scope the lookup (defaults to server CWD project)
      responses:
        '204':
          description: No Content (Agent killed)
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (operation already in progress)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      required: [error, code, details]
      properties:
        error:
          type: string
          description: "Machine-readable error type (e.g. internal_error, not_found, unauthorized, docker_connect)"
          enum: [not_found, unauthorized, internal_error, docker_connect]
        code:
          type: integer
          description: "HTTP status code"
        details:
          type: string
          description: "Human-readable error description"

    MergeConflictError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            error:
              type: string
              enum: [merge_conflict]

    StatusResponse:
      type: object
      properties:
        status:
          type: string
          example: "OK"
        docker_error:
          type: string
          nullable: true
          description: "Error message if there is an issue connecting to Docker"
        version:
          type: string
          example: "1.0.0"
        uptime_seconds:
          type: number
          format: float
          description: Seconds since the server started
        project_root:
          type: string
          description: Absolute path to the default project root (server CWD)
        default_project_id:
          type: string
          description: Project ID of the default (CWD) project
        dev_restart_available:
          type: boolean
          description: Whether /api/dev/restart is available (dev mode only)

    ProjectInfo:
      type: object
      required: [id, path, name]
      properties:
        id:
          type: string
          description: Unique project identifier (derived from folder name)
        path:
          type: string
          description: Absolute filesystem path to the project root
        name:
          type: string
          description: Human-readable project name (last path component)

    AddProjectRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute filesystem path to the project root (must be a git repository)

    SpawnAgentRequest:
      type: object
      required: [id]
      properties:
        prompt:
          type: string
          description: The prompt to give to the agent
        id:
          type: string
          description: Unique identifier for the agent (slug format, max 40 chars)
        agent_type:
          type: string
          description: "Agent type: claude, gemini, or bash"
        base_branch:
          type: string
          description: Base branch to create the worktree from (defaults to current branch)
        ephemeral:
          type: boolean
          description: If true, the agent is temporary and its container will be removed on stop.

    AgentStatus:
      type: string
      enum:
        - pending
        - building
        - starting
        - running
        - waiting
        - stopped
        - killing
        - merging
      description: "The computed status of the agent (derived from container, agent, and head status)"

    AgentStatusInfo:
      type: object
      required: [status, timestamp]
      properties:
        status:
          $ref: '#/components/schemas/AgentStatus'
        event:
          type: string
          description: "The hook event that triggered this status (SessionStart, Stop, SessionEnd, or polling)"
        timestamp:
          type: string
          description: "ISO 8601 timestamp of when the status was set"
        last_message:
          type: string
          description: "Last assistant message (only present on Stop events)"
        reason:
          type: string
          description: "Session end reason (only present on SessionEnd events)"

    AgentResponse:
      type: object
      required: [id, project_path, container_id, container_status, agent_type, pre_prompt, prompt, base_branch]
      properties:
        id:
          type: string
        branch_name:
          type: string
          nullable: true
        worktree_path:
          type: string
          nullable: true
        project_path:
          type: string
        container_id:
          type: string
        container_status:
          type: string
        agent_type:
          type: string
        pre_prompt:
          type: string
        prompt:
          type: string
        base_branch:
          type: string
        ephemeral:
          type: boolean
          description: If true, the agent is temporary and its container will be removed on stop.
        created_at:
          type: integer
          format: int64
          description: Unix timestamp (seconds) when the container was created/started; 0 if no container
        agent_status:
          $ref: '#/components/schemas/AgentStatusInfo'

    CommitInfo:
      type: object
      required: [sha, short_sha, message, author_name, author_email, timestamp]
      properties:
        sha:
          type: string
          description: Full 40-character commit SHA
        short_sha:
          type: string
          description: Abbreviated 7-character commit SHA
        message:
          type: string
          description: Full commit message
        subject:
          type: string
          description: First line of the commit message
        author_name:
          type: string
        author_email:
          type: string
        timestamp:
          type: string
          description: ISO 8601 timestamp of the author date

    DiffLine:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [context, addition, deletion, no_newline]
          description: "context: unchanged line; addition: added line; deletion: removed line; no_newline: no newline at end of file"
        content:
          type: string
          description: Line content without the diff prefix character
        old_line_num:
          type: integer
          nullable: true
          description: Line number in the old file (null for additions)
        new_line_num:
          type: integer
          nullable: true
          description: Line number in the new file (null for deletions)

    DiffHunk:
      type: object
      required: [header, old_start, new_start, lines]
      properties:
        header:
          type: string
          description: The @@ ... @@ hunk header line
        old_start:
          type: integer
          description: Starting line number in the old file
        new_start:
          type: integer
          description: Starting line number in the new file
        lines:
          type: array
          items:
            $ref: '#/components/schemas/DiffLine'

    DiffFile:
      type: object
      required: [path, change_type, additions, deletions, binary, hunks]
      properties:
        path:
          type: string
          description: File path (new path for renamed files)
        old_path:
          type: string
          nullable: true
          description: Original file path (only set for renamed files)
        change_type:
          type: string
          enum: [added, modified, deleted, renamed]
        additions:
          type: integer
          description: Number of added lines
        deletions:
          type: integer
          description: Number of deleted lines
        binary:
          type: boolean
          description: True if this is a binary file
        hunks:
          type: array
          items:
            $ref: '#/components/schemas/DiffHunk'

    DiffResponse:
      type: object
      required: [files, base_ref, head_ref]
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/DiffFile'
        base_ref:
          type: string
          description: The base ref used for this diff
        head_ref:
          type: string
          description: The head ref used for this diff
        merge_conflict:
          type: boolean
          description: True if there are merge conflicts between base_ref and head_ref
        uncommitted_changes:
          type: boolean
          description: True if there are uncommitted changes in the worktree
        base_commit:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CommitInfo'
          description: Details of the base commit (if a specific commit SHA was given)
        head_commit:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CommitInfo'
          description: Details of the head commit

    AgentConfig:
      type: object
      properties:
        dockerfile:
          type: string
          nullable: true
        dockerfile_contents:
          type: string
          nullable: true
        dockerignore_contents:
          type: string
          nullable: true
        shared_mounts:
          type: array
          items:
            type: string
          nullable: true
        context:
          type: string
          nullable: true
        pre_prompt:
          type: string
          nullable: true

    ConfigResponse:
      type: object
      required: [defaults, agents]
      properties:
        defaults:
          $ref: '#/components/schemas/AgentConfig'
        agents:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AgentConfig'
        default_dockerfiles:
          type: object
          additionalProperties:
            type: string
          description: Built-in default Dockerfiles for each agent type (read-only)

    TerminalEvent:
      type: object
      required: [type]
      discriminator:
        propertyName: type
        mapping:
          status: '#/components/schemas/TerminalStatusEvent'
          data: '#/components/schemas/TerminalDataEvent'
          build_finished: '#/components/schemas/TerminalEvent'
      properties:
        type:
          type: string
          enum: [status, data, build_finished]

    TerminalStatusEvent:
      allOf:
        - $ref: '#/components/schemas/TerminalEvent'
        - type: object
          properties:
            status:
              $ref: '#/components/schemas/AgentStatus'

    TerminalDataEvent:
      allOf:
        - $ref: '#/components/schemas/TerminalEvent'
        - type: object
          properties:
            data:
              type: string
              description: Base64 encoded binary data or plain string

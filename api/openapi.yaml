openapi: 3.0.3
info:
  title: Hydra API
  version: 1.0.0

paths:
  /health:
    get:
      summary: Health check
      operationId: checkHealth
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: "OK"

  /api/status:
    get:
      summary: Get system status
      operationId: getStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agents:
    get:
      summary: List all Hydra agents (heads)
      operationId: listAgents
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Spawn a new Hydra agent
      operationId: spawnAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpawnAgentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agent/{id}:
    get:
      summary: Get a specific Hydra agent by ID
      operationId: getAgent
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Kill a Hydra agent by ID
      operationId: killAgent
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content (Agent killed)
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error: { type: string }
        code: { type: integer }
        details: { type: string }

    StatusResponse:
      type: object
      properties:
        status:
          type: string
          example: "OK"
        version:
          type: string
          example: "1.0.0"
        uptime_seconds:
          type: number
          format: float
          description: Seconds since the server started
        project_root:
          type: string
          description: Absolute path to the project root

    SpawnAgentRequest:
      type: object
      required: [prompt, id]
      properties:
        prompt:
          type: string
          description: The prompt to give to the agent
        id:
          type: string
          description: Unique identifier for the agent (slug format, max 40 chars)
        agent_type:
          type: string
          description: "Agent type: claude or gemini"
        base_branch:
          type: string
          description: Base branch to create the worktree from (defaults to current branch)

    ClaudeStatusInfo:
      type: object
      required: [status, event, timestamp]
      properties:
        status:
          type: string
          description: "Current status: starting, waiting, or ended"
        event:
          type: string
          description: "The hook event that triggered this status (SessionStart, Stop, or SessionEnd)"
        timestamp:
          type: string
          description: "ISO 8601 timestamp of when the status was set"
        last_message:
          type: string
          description: "Last assistant message (only present on Stop events)"
        reason:
          type: string
          description: "Session end reason (only present on SessionEnd events)"

    AgentResponse:
      type: object
      required: [id, project_path, container_id, container_status, agent_type, pre_prompt, prompt, base_branch]
      properties:
        id:
          type: string
        branch_name:
          type: string
          nullable: true
        worktree_path:
          type: string
          nullable: true
        project_path:
          type: string
        container_id:
          type: string
        container_status:
          type: string
        agent_type:
          type: string
        pre_prompt:
          type: string
        prompt:
          type: string
        base_branch:
          type: string
        claude_status:
          $ref: '#/components/schemas/ClaudeStatusInfo'

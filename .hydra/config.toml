[defaults]
dockerfile_contents = """

# Install unzip (required for bun)
RUN apt-get update && apt-get install -y \\
        unzip \\
    && rm -rf /var/lib/apt/lists/*

# Install Go
RUN curl -fsSL https://go.dev/dl/go1.25.0.linux-amd64.tar.gz | tar -C /usr/local -xz
ENV PATH=$PATH:/usr/local/go/bin
ENV GOFLAGS="-buildvcs=false"
RUN go version

# Install mage
RUN go install github.com/magefile/mage@v1.15.0 && mv /root/go/bin/mage /usr/bin/

# Install bun
RUN curl -fsSL https://bun.com/install | bash && mv /root/.bun/bin/bun /usr/bin/bun && ln -s /usr/bin/bun /usr/bin/bunx
"""
shared_mounts = ["~/.cache/go-build", "~/go/pkg", "~/.bun/install/cache"]
pre_prompt = """
- Use bun instead of npm, and bun x instead of npx
- Check using mage build before committing"""

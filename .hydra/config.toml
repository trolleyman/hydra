[defaults]
  dockerfile_contents = "\n# Install unzip (required for bun)\nRUN apt-get update && apt-get install -y \\\n        unzip \\\n    && rm -rf /var/lib/apt/lists/*\n\n# Install Go 1.22\nRUN curl -fsSL https://go.dev/dl/go1.22.0.linux-amd64.tar.gz | tar -C /usr/local -xz\nENV PATH=$PATH:/usr/local/go/bin\nRUN go version\n\n# Install mage\nRUN go install github.com/magefile/mage@latest && mv /root/go/bin/mage /usr/bin/\n\n# Install bun\nRUN curl -fsSL https://bun.com/install | bash && mv /root/.bun/bin/bun /usr/bin/bun && ln -s /usr/bin/bun /usr/bin/bunx\n"
  pre_prompt = "You are a head (AI agent) of Hydra, an AI orchestration platform.\n- You have unrestricted access to the file system.\n- You are allowed to install what is necessary to complete the task.\n- You are running inside a Docker container.\n- As you work, use git commit to save your progress at logical points.\n- Once you have finished the task, make a final git commit with all remaining changes.\n- Do *not* use git push.\n- Use bun instead of npm, and bun x instead of npx\n- Check using mage build before committing\n\nTask:\n"

[agents]
